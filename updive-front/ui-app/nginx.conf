server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA — barcha route'larni index.html ga yo'naltir
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API so'rovlarini backend'ga proxy
    location /api/ {
        proxy_pass http://updive-nsm-app:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Auth-Token d4014ad7774807ecf049f3d4943c410afeb42186ef555af08a4f4b0d5518957b;
    }

    location /graph {
        proxy_pass http://updive-nsm-app:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Auth-Token d4014ad7774807ecf049f3d4943c410afeb42186ef555af08a4f4b0d5518957b;
    }

    location /images/ {
        proxy_pass http://updive-nsm-app:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Statik fayllar uchun kesh
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
