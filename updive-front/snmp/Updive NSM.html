// ─── PURE SVG CHARTS ─────────────────────────────────────────────
const AreaChartSVG = ({ data, keys, colors, height = 180, showGrid = true, unit = "" }) => {
  const W = 600, H = height, PAD = { top: 10, right: 10, bottom: 24, left: 32 };
  const innerW = W - PAD.left - PAD.right;
  const innerH = H - PAD.top - PAD.bottom;
  const allVals = data.flatMap(d => keys.map(k => d[k] || 0));
  const maxVal = Math.max(...allVals, 1);
  const xStep = innerW / (data.length - 1);
  const scaleY = v => innerH - (v / maxVal) * innerH;
  const pts = (key) => data.map((d, i) => [i * xStep, scaleY(d[key] || 0)]);
  const polyline = (key) => pts(key).map(([x, y]) => `${x},${y}`).join(" ");
  const area = (key) => {
    const p = pts(key);
    return `M${p[0][0]},${innerH} ` + p.map(([x,y]) => `L${x},${y}`).join(" ") + ` L${p[p.length-1][0]},${innerH} Z`;
  };
  const ticks = 4;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height }} preserveAspectRatio="none">
      <g transform={`translate(${PAD.left},${PAD.top})`}>
        {showGrid && Array.from({ length: ticks + 1 }, (_, i) => {
          const y = (innerH / ticks) * i;
          return <line key={i} x1={0} y1={y} x2={innerW} y2={y} stroke="#f0f0f0" strokeWidth={1} />;
        })}
        {Array.from({ length: ticks + 1 }, (_, i) => {
          const v = Math.round(maxVal - (maxVal / ticks) * i);
          const y = (innerH / ticks) * i;
          return <text key={i} x={-4} y={y + 3} fontSize={8} fill="#9ca3af" textAnchor="end">{v}</text>;
        })}
        {data.filter((_, i) => i % Math.ceil(data.length / 8) === 0).map((d, idx, arr) => {
          const origIdx = data.indexOf(d);
          return <text key={idx} x={origIdx * xStep} y={innerH + 16} fontSize={8} fill="#9ca3af" textAnchor="middle">{d.time || d.name || ""}</text>;
        })}
        {keys.map((key, ki) => (
          <g key={key}>
            <defs>
              <linearGradient id={`ag${ki}`} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={colors[ki]} stopOpacity={0.3} />
                <stop offset="100%" stopColor={colors[ki]} stopOpacity={0} />
              </linearGradient>
            </defs>
            <path d={area(key)} fill={`url(#ag${ki})`} />
            <polyline points={polyline(key)} fill="none" stroke={colors[ki]} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round" />
          </g>
        ))}
      </g>
    </svg>
  );
};

const BarChartSVG = ({ data, dataKey, colorFn, height = 160 }) => {
  const W = 600, H = height, PAD = { top: 10, right: 10, bottom: 24, left: 32 };
  const innerW = W - PAD.left - PAD.right;
  const innerH = H - PAD.top - PAD.bottom;
  const maxVal = Math.max(...data.map(d => d[dataKey] || 0), 1);
  const barW = Math.max(4, (innerW / data.length) * 0.6);
  const gap = innerW / data.length;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height }} preserveAspectRatio="none">
      <g transform={`translate(${PAD.left},${PAD.top})`}>
        {[0,25,50,75,100].map(v => {
          const y = innerH - (v / 100) * innerH;
          return <line key={v} x1={0} y1={y} x2={innerW} y2={y} stroke="#f0f0f0" strokeWidth={1} />;
        })}
        {data.map((d, i) => {
          const val = d[dataKey] || 0;
          const bH = (val / maxVal) * innerH;
          const x = gap * i + gap / 2 - barW / 2;
          const y = innerH - bH;
          return (
            <g key={i}>
              <rect x={x} y={y} width={barW} height={bH} rx={3} fill={colorFn ? colorFn(d) : "#22c55e"} />
              <text x={gap * i + gap / 2} y={innerH + 16} fontSize={8} fill="#9ca3af" textAnchor="middle">{d.name || d.port || ""}</text>
            </g>
          );
        })}
      </g>
    </svg>
  );
};

const DonutChartSVG = ({ data, size = 140 }) => {
  const cx = size / 2, cy = size / 2;
  const R = size * 0.38, r = size * 0.24;
  const total = data.reduce((s, d) => s + d.value, 0);
  let angle = -Math.PI / 2;
  const slices = data.map(d => {
    const sweep = (d.value / total) * 2 * Math.PI;
    const x1 = cx + R * Math.cos(angle), y1 = cy + R * Math.sin(angle);
    angle += sweep;
    const x2 = cx + R * Math.cos(angle), y2 = cy + R * Math.sin(angle);
    const xi1 = cx + r * Math.cos(angle - sweep), yi1 = cy + r * Math.sin(angle - sweep);
    const xi2 = cx + r * Math.cos(angle), yi2 = cy + r * Math.sin(angle);
    const large = sweep > Math.PI ? 1 : 0;
    return { ...d, path: `M${x1},${y1} A${R},${R} 0 ${large},1 ${x2},${y2} L${xi2},${yi2} A${r},${r} 0 ${large},0 ${xi1},${yi1} Z` };
  });
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {slices.map((s, i) => <path key={i} d={s.path} fill={s.color} stroke="#fff" strokeWidth={2} />)}
    </svg>
  );
};

const MiniAreaSVG = ({ data, color, height = 80 }) => {
  const W = 400, H = height;
  const maxV = Math.max(...data.map(d => d.value), 1);
  const pts = data.map((d, i) => [i * (W / (data.length - 1)), H - (d.value / maxV) * (H - 10) - 5]);
  const polyline = pts.map(([x, y]) => `${x},${y}`).join(" ");
  const area = `M${pts[0][0]},${H} ` + pts.map(([x, y]) => `L${x},${y}`).join(" ") + ` L${pts[pts.length - 1][0]},${H} Z`;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height }} preserveAspectRatio="none">
      <defs>
        <linearGradient id={`mg${color.replace("#","")}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity={0.3} />
          <stop offset="100%" stopColor={color} stopOpacity={0} />
        </linearGradient>
      </defs>
      {[0.25, 0.5, 0.75].map((f, i) => (
        <line key={i} x1={0} y1={H * f} x2={W} y2={H * f} stroke="#f0f0f0" strokeWidth={1} />
      ))}
      <path d={area} fill={`url(#mg${color.replace("#","")})`} />
      <polyline points={polyline} fill="none" stroke={color} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round" />
    </svg>
  );
};

        { id:3, username:"readonly", role:"viewer",   email:"view@updive.net",     auth:"mysql", status:"inactive" },
      ]}
      renderRow={(r,i) => (
        <tr key={r.id} style={{ borderTop:"1px solid #f0f2f5", background:i%2===0?"#fff":"#fafafa" }}>
          <td style={{ padding:"10px 14px", fontSize:12, fontWeight:600, color:"#111827" }}>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <div style={{ width:26, height:26, borderRadius:"50%", background:`${accent}20`,
                display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:700, color:accent }}>
                {r.username[0].toUpperCase()}
              </div>
              {r.username}
            </div>
          </td>
          <td style={{ padding:"10px 14px" }}>
            <span style={{ background: r.role==="admin"?`${accent}15`:"#f0f2f5",
              color: r.role==="admin"?accent:"#374151",
              fontSize:10, padding:"2px 8px", borderRadius:4, fontWeight:600, textTransform:"uppercase" }}>{r.role}</span>
          </td>
          <TD>{r.email}</TD>
          <TD>{r.auth}</TD>
          <td style={{ padding:"10px 14px" }}><Badge status={r.status==="active"?"up":"down"} /></td>
        </tr>
      )}
    />
  </div>
);

// ─── PAGE: SETTINGS ───────────────────────────────────────────────
const SettingsPage = ({ accent }) => (
  <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
    <PageHeader title="Settings" desc="Global LibreNMS configuration options." />
    <div style={{ background:"#fff", borderRadius:10, border:"1px solid #e8ecf0", overflow:"hidden" }}>
      {[
        { section:"General", items:[
          { key:"site.title",       label:"Site Title",       value:"Updive NSM" },
          { key:"snmp.community",   label:"Default Community",value:"public" },
          { key:"polling.interval", label:"Poll Interval",    value:"300s" },
        ]},
        { section:"Alerting", items:[
          { key:"alert.email",      label:"Alert Email",      value:"noc@updive.net" },
          { key:"alert.interval",   label:"Re-alert Interval",value:"3600s" },
        ]},
        { section:"Authentication", items:[
          { key:"auth.mechanism",   label:"Auth Mechanism",   value:"mysql" },
          { key:"auth.ldap.server", label:"LDAP Server",      value:"ldap.updive.net" },
        ]},
      ].map(group => (
        <div key={group.section}>
          <div style={{ padding:"10px 18px", background:"#f9fafb", borderBottom:"1px solid #f0f2f5",
            fontSize:10, fontWeight:700, color:"#6b7280", textTransform:"uppercase", letterSpacing:"0.06em" }}>
            {group.section}
          </div>
          {group.items.map(item => (
            <div key={item.key} style={{ display:"flex", alignItems:"center", padding:"12px 18px",
              borderBottom:"1px solid #f9fafb" }}>
              <div style={{ width:220 }}>
                <div style={{ fontSize:12, fontWeight:500, color:"#111827" }}>{item.label}</div>
                <div style={{ fontSize:10, color:"#9ca3af", fontFamily:"monospace" }}>{item.key}</div>
              </div>
              <div style={{ flex:1 }}>
                <input defaultValue={item.value} style={{
                  border:"1px solid #e5e7eb", borderRadius:6, padding:"5px 10px",
                  fontSize:11, color:"#374151", fontFamily:"inherit", outline:"none",
                  background:"#fafafa", width:260 }} />
              </div>
            </div>
          ))}
        </div>
      ))}
    </div>
  </div>
);

// ─── MAIN APP ─────────────────────────────────────────────────────
const App = () => {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const accent = tweaks.accentColor;
  const [page, setPage] = useState("dashboard");
  const [collapsed, setCollapsed] = useState(false);

  const renderPage = () => {
    switch(page) {
      case "dashboard":     return <DashboardPage accent={accent} />;
      case "devices":       return <DevicesPage accent={accent} />;
      case "device_groups": return <DeviceGroupsPage accent={accent} />;
      case "alerts":        return <AlertsPage accent={accent} />;
      case "services":      return <ServicesPage accent={accent} />;
      case "logs":          return <LogsPage accent={accent} />;
      case "pollers":       return <PollersPage accent={accent} />;
      case "poller_groups": return <PollerGroupsPage accent={accent} />;
      case "ports":         return <PortsPage accent={accent} />;
      case "port_groups":   return <PortGroupsPage accent={accent} />;
      case "arp":           return <ArpPage accent={accent} />;
      case "bgp":           return <BgpPage accent={accent} />;
      case "ospf":          return <OspfPage accent={accent} />;
      case "vrf":           return <VrfPage accent={accent} />;
      case "vlans":         return <VlansPage accent={accent} />;
      case "port_security": return <PortSecurityPage accent={accent} />;
      case "inventory":     return <InventoryPage accent={accent} />;
      case "bills":         return <BillsPage accent={accent} />;
      case "locations":     return <LocationsPage accent={accent} />;
      case "system":        return <SystemPage accent={accent} />;
      case "users":         return <UsersPage accent={accent} />;
      case "settings":      return <SettingsPage accent={accent} />;
      default:              return <DashboardPage accent={accent} />;
    }
  };

  return (
    <div style={{ display: "flex", height: "100vh", overflow: "hidden", background: tweaks.contentBg }}>
      <style>{`
        @keyframes pulse {
          0%, 100% { opacity: 1; transform: scale(1); }
          50% { opacity: 0.5; transform: scale(1.3); }
        }
      `}</style>
      <Sidebar active={page} onNav={setPage} collapsed={collapsed} accent={accent} />
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
        <TopBar page={page} onToggle={() => setCollapsed(c => !c)} accent={accent} />
        <main style={{ flex: 1, overflowY: "auto", padding: "20px 24px" }}>
          {renderPage()}
        </main>
      </div>
      <TweaksPanel>
        <TweakColor  label="Accent Color"   value={tweaks.accentColor}  onChange={v => setTweak("accentColor", v)} />
        <TweakToggle label="Compact Mode"   value={tweaks.compactMode}  onChange={v => setTweak("compactMode", v)} />
        <TweakToggle label="Show Grid Lines" value={tweaks.showGridLines} onChange={v => setTweak("showGridLines", v)} />
      </TweaksPanel>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
