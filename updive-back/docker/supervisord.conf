[supervisord]
nodaemon=true
user=root
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid

[program:php-fpm]
command=php-fpm
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:laravel-scheduler]
command=/bin/sh -c "while true; do su-exec www-data /usr/local/bin/php /opt/updive-nsm/artisan schedule:run --no-interaction; sleep 60; done"
autostart=true
autorestart=true
user=root
stdout_logfile=/opt/updive-nsm/storage/logs/scheduler.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile=/opt/updive-nsm/storage/logs/scheduler.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3

[program:laravel-worker]
process_name=%(program_name)s_%(process_num)02d
command=su-exec www-data /usr/local/bin/php /opt/updive-nsm/artisan queue:work --sleep=3 --tries=3 --max-time=300
autostart=true
autorestart=true
user=root
numprocs=2
stdout_logfile=/opt/updive-nsm/storage/logs/worker.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile=/opt/updive-nsm/storage/logs/worker.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3

[program:crond]
command=crond -f -l 2
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
