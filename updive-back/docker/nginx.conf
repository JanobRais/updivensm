server {
    listen 80;
    server_name _;
    charset utf-8;

    # PHP scripts root (Laravel + legacy API)
    root /opt/updive-nsm/html;

    # ── PHP file handler ───────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # ── API v0 (legacy LibreNMS handler) ───────────────────────────
    location /api/v0 {
        try_files $uri $uri/ /api_v0.php?$query_string;
    }

    # ── API v1, v2 (Laravel routes) ────────────────────────────────
    location ~ ^/api/v[12] {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Hashed static assets from React build ─────────────────────
    location /assets/ {
        root /opt/updive-nsm/ui;
        expires max;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── React SPA — qolgan barcha so'rovlar ────────────────────────
    location / {
        root /opt/updive-nsm/ui;
        try_files $uri /index.html;
    }

    location ~ /\.ht {
        deny all;
    }
}
