services:
  frontend:
    build: ../updive-front/ui-app
    container_name: updive-nsm-frontend
    restart: always
    ports:
      - "5176:5176"
    environment:
      - TZ=Asia/Tashkent
      - IN_DOCKER=true
    volumes:
      - ../updive-front/ui-app:/app
      - /app/node_modules
    depends_on:
      - app

  app:
    build: .
    container_name: updive-nsm-app
    restart: always
    ports:
      - "8091:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DB_HOST=db
      - DB_DATABASE=updive_nsm
      - DB_USERNAME=updive
      - DB_PASSWORD=updive_pass
      - MYSQL_ROOT_PASSWORD=root_pass
      - REDIS_HOST=redis
      - TZ=Asia/Tashkent
      - UpdiveNSM_USER=www-data
      - UpdiveNSM_GROUP=www-data
    volumes:
      - .:/opt/updive-nsm
      - ../updive-front/ui-app/dist:/opt/updive-nsm/ui:ro
    depends_on:
      - db
      - redis

  db:
    image: mariadb:10.11
    container_name: updive-nsm-db
    restart: always
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=updive_nsm
      - TZ=Asia/Tashkent
      - MYSQL_USER=updive
      - MYSQL_PASSWORD=updive_pass
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: updive-nsm-redis
    restart: always
    ports:
      - "6381:6379"
    environment:
      - TZ=Asia/Tashkent

  # ── SNMP Simulators (dev only — comment out for production) ────────
  snmp-switch-01:
    image: tandrup/snmpsim:latest
    container_name: snmp-switch-01
    restart: always
    volumes:
      - ./snmpsim/data/switch-01/public.snmprec:/usr/local/snmpsim/data/public.snmprec:ro
    environment:
      - TZ=Asia/Tashkent
    ports:
      - "16101:161/udp"

  snmp-switch-02:
    image: tandrup/snmpsim:latest
    container_name: snmp-switch-02
    restart: always
    volumes:
      - ./snmpsim/data/switch-02/public.snmprec:/usr/local/snmpsim/data/public.snmprec:ro
    environment:
      - TZ=Asia/Tashkent
    ports:
      - "16102:161/udp"

  snmp-switch-03:
    image: tandrup/snmpsim:latest
    container_name: snmp-switch-03
    restart: always
    volumes:
      - ./snmpsim/data/switch-03/public.snmprec:/usr/local/snmpsim/data/public.snmprec:ro
    environment:
      - TZ=Asia/Tashkent
    ports:
      - "16103:161/udp"

  snmp-switch-04:
    image: tandrup/snmpsim:latest
    container_name: snmp-switch-04
    restart: always
    volumes:
      - ./snmpsim/data/switch-04/public.snmprec:/usr/local/snmpsim/data/public.snmprec:ro
    environment:
      - TZ=Asia/Tashkent
    ports:
      - "16104:161/udp"

  snmp-switch-05:
    image: tandrup/snmpsim:latest
    container_name: snmp-switch-05
    restart: always
    volumes:
      - ./snmpsim/data/switch-05/public.snmprec:/usr/local/snmpsim/data/public.snmprec:ro
    environment:
      - TZ=Asia/Tashkent
    ports:
      - "16105:161/udp"

volumes:
  db_data:
