services:
  frontend:
    build:
      context: ../updive-front/ui-app
      args:
        VITE_BACKEND_URL: ""
    container_name: updive-nsm-frontend
    restart: always
    ports:
      - "5176:80"
    environment:
      - TZ=Asia/Tashkent
    depends_on:
      - app

  app:
    build: .
    container_name: updive-nsm-app
    restart: always
    ports:
      - "8091:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DB_HOST=db
      - DB_DATABASE=updive_nsm
      - DB_USERNAME=updive
      - DB_PASSWORD=updive_pass
      - MYSQL_ROOT_PASSWORD=root_pass
      - REDIS_HOST=redis
      - TZ=Asia/Tashkent
      - UpdiveNSM_USER=www-data
      - UpdiveNSM_GROUP=www-data
    volumes:
      - .:/opt/updive-nsm
      - ../updive-front/ui-app/dist:/opt/updive-nsm/ui:ro
    depends_on:
      - db
      - redis

  db:
    image: mariadb:10.11
    container_name: updive-nsm-db
    restart: always
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=updive_nsm
      - TZ=Asia/Tashkent
      - MYSQL_USER=updive
      - MYSQL_PASSWORD=updive_pass
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: updive-nsm-redis
    restart: always
    ports:
      - "6381:6379"
    environment:
      - TZ=Asia/Tashkent


volumes:
  db_data:
