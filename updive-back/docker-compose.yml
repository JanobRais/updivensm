services:
  app:
    build: .
    container_name: updive-nsm-app
    restart: always
    ports:
      - "8091:80"        # 8080,8086,8008,8009 band (SIEM) → 8091 ishlatiladi
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DB_HOST=db
      - DB_DATABASE=updive_nsm
      - DB_USERNAME=updive
      - DB_PASSWORD=updive_pass
      - MYSQL_ROOT_PASSWORD=root_pass
      - REDIS_HOST=redis
      - UpdiveNSM_USER=www-data
      - UpdiveNSM_GROUP=www-data
    volumes:
      - .:/opt/updive-nsm
    depends_on:
      - db
      - redis

  db:
    image: mariadb:10.11
    container_name: updive-nsm-db
    restart: always
    ports:
      - "3307:3306"      # 3306 standart, 5431 SIEM band → 3307 ishlatiladi
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=updive_nsm
      - MYSQL_USER=updive
      - MYSQL_PASSWORD=updive_pass
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: updive-nsm-redis
    restart: always
    ports:
      - "6381:6379"      # 6380 SIEM-redis band → 6381 ishlatiladi

  # ── SNMP Simulators ────────────────────────────────────────────────
  # Cisco Catalyst 2960-X  |  community: public  |  SNMPv2c
  snmp-switch-01:
    image: tandrup/snmpsim:latest
    container_name: snmp-switch-01
    hostname: snmp-switch-01
    restart: always
    volumes:
      - ./snmpsim/data/switch-01/public.snmprec:/usr/local/snmpsim/data/public.snmprec:ro
    ports:
      - "16101:161/udp"  # Xavfsiz (SIEM da yo'q)

  # Cisco Catalyst 3750-X  |  community: public  |  SNMPv2c
  snmp-switch-02:
    image: tandrup/snmpsim:latest
    container_name: snmp-switch-02
    hostname: snmp-switch-02
    restart: always
    volumes:
      - ./snmpsim/data/switch-02/public.snmprec:/usr/local/snmpsim/data/public.snmprec:ro
    ports:
      - "16102:161/udp"

  # Cisco Catalyst 2960S  |  SW-SAM-FL1-01  |  Samarqand 1-qavat  |  community: public
  snmp-switch-03:
    image: tandrup/snmpsim:latest
    container_name: snmp-switch-03
    hostname: snmp-switch-03
    restart: always
    volumes:
      - ./snmpsim/data/switch-03/public.snmprec:/usr/local/snmpsim/data/public.snmprec:ro
    ports:
      - "16103:161/udp"

  # Cisco Catalyst 2960S  |  SW-SAM-FL2-01  |  Samarqand 2-qavat  |  community: public
  snmp-switch-04:
    image: tandrup/snmpsim:latest
    container_name: snmp-switch-04
    hostname: snmp-switch-04
    restart: always
    volumes:
      - ./snmpsim/data/switch-04/public.snmprec:/usr/local/snmpsim/data/public.snmprec:ro
    ports:
      - "16104:161/udp"

  # Cisco Catalyst 2960C  |  SW-SAM-MGMT-01  |  Samarqand Management  |  community: public
  snmp-switch-05:
    image: tandrup/snmpsim:latest
    container_name: snmp-switch-05
    hostname: snmp-switch-05
    restart: always
    volumes:
      - ./snmpsim/data/switch-05/public.snmprec:/usr/local/snmpsim/data/public.snmprec:ro
    ports:
      - "16105:161/udp"

volumes:
  db_data:
