# Vendor OID Prefix → OS Name fallback map
# Used by Core::detectOS() when no exact sysObjectID match is found in os_detection/ YAMLs.
# Format:  OID_prefix: os_name
# The os_name must correspond to a file in resources/definitions/os_detection/
# Only add vendors where one OS module confidently covers all devices under that prefix.

.1.3.6.1.4.1.35265.1.: eltex-mes23xx   # Eltex MES 23xx/24xx series
.1.3.6.1.4.1.35265.2.: eltex-mes21xx   # Eltex MES 21xx series
.1.3.6.1.4.1.35265.3.: eltex-olt       # Eltex OLT series
